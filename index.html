<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Busca de Clientes</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#1976d2;
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
}

input,select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
font-size:15px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.codigo{
font-weight:bold;
font-size:16px;
}

.nome{
font-size:15px;
margin-top:3px;
}

.endereco{
font-size:13px;
color:#777;
margin-top:5px;
}

.base{
font-size:12px;
color:#1976d2;
margin-top:4px;
}

.botoes{
margin-top:10px;
display:flex;
gap:8px;
}

.botao{
flex:1;
padding:8px;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
color:white;
}

.rota{
background:#1976d2;
}

.visita{
background:#43a047;
}

</style>

</head>

<body>

<header>
Sistema de Clientes
</header>

<div class="container">

<input id="busca" placeholder="Buscar cliente ou código">

<select id="cidade">
<option value="">Todas as cidades</option>
</select>

<select id="base">
<option value="">Todas as bases</option>
</select>

<div id="lista"></div>

</div>

<script>

const api = "https://script.google.com/macros/s/AKfycbyi69WjNXYRyIU281YMsZuhtj03Gg-r-W6rOFMwO1rcnuZNRIm8vXNGy053nx32mwgM/exec";

let clientes=[];



async function carregar(){

try{

const res = await fetch(api+"?action=clientes");

clientes = await res.json();

popularCidades();

popularBases();

mostrar(clientes);

}catch(e){

alert("Erro ao carregar clientes");

}

}



function popularCidades(){

const cidades = [...new Set(clientes.map(c=>c.cidade))];

const select = document.getElementById("cidade");

cidades.forEach(c=>{

const op = document.createElement("option");

op.value=c;

op.textContent=c;

select.appendChild(op);

});

}



function popularBases(){

const bases = [...new Set(clientes.map(c=>c.base))];

const select = document.getElementById("base");

bases.forEach(b=>{

const op = document.createElement("option");

op.value=b;

op.textContent=b;

select.appendChild(op);

});

}



function mostrar(lista){

const div = document.getElementById("lista");

div.innerHTML="";

if(lista.length==0){

div.innerHTML="<p>Nenhum cliente encontrado</p>";
return;

}

lista.forEach(c=>{

const card = document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="codigo">${c.codigo}</div>

<div class="nome">${c.cliente}</div>

<div class="endereco">${c.endereco}</div>

<div class="base">Base: ${c.base}</div>

<div class="botoes">

<button class="botao rota"
onclick="rota('${c.endereco}')">
Abrir rota
</button>

<button class="botao visita"
onclick="visita('${c.codigo}')">
Registrar visita
</button>

</div>

`;

div.appendChild(card);

});

}



function rota(endereco){

const url="https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(endereco);

window.open(url);

}



async function visita(codigo){

await fetch(api+"?action=visita&codigo="+codigo+"&vendedor=1");

alert("Visita registrada");

}



async function buscar(){

const termo=document.getElementById("busca").value;

const cidade=document.getElementById("cidade").value;

const base=document.getElementById("base").value;

let url=api+"?action=buscar&q="+encodeURIComponent(termo);

if(cidade){

url+="&cidade="+encodeURIComponent(cidade);

}

if(base){

url+="&base="+encodeURIComponent(base);

}

const res=await fetch(url);

const dados=await res.json();

mostrar(dados);

}



document.getElementById("busca").addEventListener("input",buscar);

document.getElementById("cidade").addEventListener("change",buscar);

document.getElementById("base").addEventListener("change",buscar);



carregar();

</script>

</body>

</html>
