<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Busca de Clientes</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
margin:0;
}

header{
background:#1e88e5;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
}

input{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
margin-bottom:10px;
}

select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
margin-bottom:15px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.codigo{
font-weight:bold;
font-size:16px;
}

.nome{
font-size:15px;
color:#444;
margin-top:3px;
}

.endereco{
font-size:13px;
color:#777;
margin-top:4px;
}

.botoes{
margin-top:10px;
display:flex;
gap:8px;
}

.botao{
flex:1;
padding:8px;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
color:white;
}

.rota{
background:#1e88e5;
}

.ligar{
background:#43a047;
}

.whatsapp{
background:#25D366;
}

</style>

</head>

<body>

<header>
Busca de Clientes
</header>

<div class="container">

<input id="busca" placeholder="Buscar por código ou cliente">

<select id="cidade">
<option value="">Todas as cidades</option>
</select>

<div id="lista"></div>

</div>

<script>

const api = "https://script.google.com/macros/s/AKfycbyi69WjNXYRyIU281YMsZuhtj03Gg-r-W6rOFMwO1rcnuZNRIm8vXNGy053nx32mwgM/exec";

let clientes=[];



async function carregar(){

try{

const res = await fetch(api+"?action=clientes");

clientes = await res.json();

popularCidades();

mostrar(clientes);

}catch(e){

alert("Erro ao carregar clientes");

}

}



function popularCidades(){

const cidades = [...new Set(clientes.map(c=>c.cidade))];

const select = document.getElementById("cidade");

cidades.forEach(c=>{

const op = document.createElement("option");

op.value=c;

op.textContent=c;

select.appendChild(op);

});

}



function mostrar(lista){

const div = document.getElementById("lista");

div.innerHTML="";

if(lista.length==0){

div.innerHTML="<p>Nenhum cliente encontrado</p>";
return;

}

lista.forEach(c=>{

const card = document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="codigo">${c.codigo}</div>

<div class="nome">${c.cliente}</div>

<div class="endereco">${c.endereco}</div>

<div class="botoes">

<button class="botao rota"
onclick="rota('${c.endereco}')">
Rota
</button>

<button class="botao ligar"
onclick="ligar('${c.telefone || ""}')">
Ligar
</button>

<button class="botao whatsapp"
onclick="whats('${c.telefone || ""}')">
WhatsApp
</button>

</div>

`;

div.appendChild(card);

});

}



function rota(endereco){

const url="https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(endereco);

window.open(url);

}



function ligar(tel){

if(!tel){

alert("Telefone não disponível");

return;

}

window.location.href="tel:"+tel;

}



function whats(tel){

if(!tel){

alert("Telefone não disponível");

return;

}

window.open("https://wa.me/"+tel);

}



async function buscar(){

const termo=document.getElementById("busca").value;

const cidade=document.getElementById("cidade").value;

let url=api+"?action=buscar&q="+encodeURIComponent(termo);

if(cidade){

url+="&cidade="+encodeURIComponent(cidade);

}

const res=await fetch(url);

const dados=await res.json();

mostrar(dados);

}



document.getElementById("busca").addEventListener("input",buscar);

document.getElementById("cidade").addEventListener("change",buscar);



carregar();

</script>

</body>

</html>
