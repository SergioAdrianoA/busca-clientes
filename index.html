<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f4f6f8}

header{background:#1976d2;color:white;padding:15px;text-align:center}

.container{padding:15px}

.card{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.15)
}

.visitado{background:#d4edda}

button{
padding:10px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
margin:3px
}

#map{height:420px}

</style>

</head>

<body>

<header>Sistema de Rotas</header>

<div class="container">

<div id="login">

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>


<div id="menu" style="display:none">

<button onclick="abrirTela('clientes')">Clientes</button>
<button onclick="abrirTela('rota')">Rota</button>
<button onclick="abrirTela('mapa')">Mapa</button>
<button onclick="abrirTela('dashboard')">Dashboard</button>

</div>


<div id="clientes" style="display:none">

<input id="busca" placeholder="Buscar cliente">

<select id="filtroCidade"></select>
<select id="filtroBairro"></select>
<select id="filtroBase"></select>

<button onclick="buscarClientes()">Buscar</button>

<div id="listaClientes"></div>

</div>


<div id="rota" style="display:none">

<div id="listaRota"></div>

</div>


<div id="mapa" style="display:none">

<button onclick="mostrarRotaMapa()">Mostrar rota</button>
<button onclick="gerarRotaGoogle()">Gerar rota</button>

<div id="map"></div>

</div>


<div id="dashboard" style="display:none">

<canvas id="grafico"></canvas>

</div>


</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API="https://script.google.com/macros/s/AKfycbyi69WjNXYRyIU281YMsZuhtj03Gg-r-W6rOFMwO1rcnuZNRIm8vXNGy053nx32mwgM/exec"

let mapa=L.map('map').setView([-2.6,-54.9],12)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(mapa)

let marcadores=[]


async function login(){

let usuario=document.getElementById("usuario").value
let senha=document.getElementById("senha").value

let r=await fetch(API+"?action=login&usuario="+usuario+"&senha="+senha)

let d=await r.json()

if(d.status=="ok"){

localStorage.setItem("vendedor",usuario)

document.getElementById("login").style.display="none"
document.getElementById("menu").style.display="block"

}

}


function abrirTela(t){

document.getElementById("clientes").style.display="none"
document.getElementById("rota").style.display="none"
document.getElementById("mapa").style.display="none"
document.getElementById("dashboard").style.display="none"

document.getElementById(t).style.display="block"

if(t=="clientes") carregarFiltros()

if(t=="rota") carregarRota()

if(t=="dashboard") carregarDashboard()

}



async function carregarFiltros(){

let r=await fetch(API+"?action=filtros")

let dados=await r.json()

let cidade=document.getElementById("filtroCidade")
let bairro=document.getElementById("filtroBairro")
let base=document.getElementById("filtroBase")

cidade.innerHTML="<option value=''>Cidade</option>"
bairro.innerHTML="<option value=''>Bairro</option>"
base.innerHTML="<option value=''>Base</option>"

dados.cidades.forEach(c=>{
cidade.innerHTML+=`<option value="${c}">${c}</option>`
})

dados.bairros.forEach(b=>{
bairro.innerHTML+=`<option value="${b}">${b}</option>`
})

dados.bases.forEach(b=>{
base.innerHTML+=`<option value="${b}">${b}</option>`
})

}



async function buscarClientes(){

let termo=document.getElementById("busca").value

let r=await fetch(API+"?action=buscar&q="+termo)

let lista=await r.json()

let div=document.getElementById("listaClientes")

div.innerHTML=""

lista.forEach(c=>{

div.innerHTML+=`

<div class="card">

<b>${c.codigo}</b><br>
${c.cliente}<br>

<button onclick="addRota('${c.codigo}')">Adicionar rota</button>

</div>

`

})

}



async function addRota(codigo){

let vendedor=localStorage.getItem("vendedor")

await fetch(API+"?action=rota_salvar&codigo="+codigo+"&vendedor="+vendedor)

alert("Adicionado")

}



async function carregarRota(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_listar&vendedor="+vendedor)

let rota=await r.json()

let div=document.getElementById("listaRota")

div.innerHTML=""

rota.forEach(c=>{

let classe=c.visitado?"card visitado":"card"

div.innerHTML+=`

<div class="${classe}">

<b>${c.codigo}</b> - ${c.cliente}

<button onclick="visita('${c.codigo}')">Visita</button>

</div>

`

})

}



async function visita(codigo){

let vendedor=localStorage.getItem("vendedor")

await fetch(API+"?action=visita&codigo="+codigo+"&vendedor="+vendedor)

carregarRota()

}



async function carregarDashboard(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=dashboard&vendedor="+vendedor)

let d=await r.json()

let pendentes=d.total_rota-d.visitas_hoje

new Chart(document.getElementById("grafico"),{

type:"doughnut",

data:{
labels:["Visitados","Pendentes"],
datasets:[{
data:[d.visitas_hoje,pendentes],
backgroundColor:["green","orange"]
}]
}

})

}

</script>

</body>

</html>
