<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema de Rotas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.visitado{
background:#d4edda;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
margin:4px;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;
}

#map{
height:400px;
}

</style>

</head>

<body>

<header>Sistema de Rotas</header>

<div id="login" class="container">

<h2>Login</h2>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div id="menu" class="container" style="display:none">

<button onclick="abrirTela('clientes')">Clientes</button>
<button onclick="abrirTela('rota')">Rota do Dia</button>
<button onclick="abrirTela('mapa')">Mapa</button>
<button onclick="abrirTela('dashboard')">Dashboard</button>
<button onclick="logout()">Sair</button>

</div>

<div id="clientes" class="container" style="display:none">

<button onclick="voltarMenu()">Menu</button>

<input id="busca" placeholder="Buscar cliente">

<select id="filtroCidade"></select>
<select id="filtroBairro"></select>
<select id="filtroBase"></select>

<div id="listaClientes"></div>

</div>

<div id="rota" class="container" style="display:none">

<button onclick="voltarMenu()">Menu</button>

<div id="listaRota"></div>

</div>

<div id="mapa" class="container" style="display:none">

<button onclick="voltarMenu()">Menu</button>

<div id="map"></div>

</div>

<div id="dashboard" class="container" style="display:none">

<button onclick="voltarMenu()">Menu</button>

<canvas id="grafico"></canvas>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyi69WjNXYRyIU281YMsZuhtj03Gg-r-W6rOFMwO1rcnuZNRIm8vXNGy053nx32mwgM/exec";

let clientes=[];

async function login(){

let usuario=document.getElementById("usuario").value
let senha=document.getElementById("senha").value

let r=await fetch(API+"?action=login&usuario="+usuario+"&senha="+senha)

let d=await r.json()

if(d.status=="ok"){

localStorage.setItem("vendedor",usuario)

document.getElementById("login").style.display="none"
document.getElementById("menu").style.display="block"

}else{

alert("Login inválido")

}

}

function logout(){

localStorage.removeItem("vendedor")
location.reload()

}

function abrirTela(t){

document.getElementById("menu").style.display="none"
document.getElementById("clientes").style.display="none"
document.getElementById("rota").style.display="none"
document.getElementById("mapa").style.display="none"
document.getElementById("dashboard").style.display="none"

document.getElementById(t).style.display="block"

if(t=="clientes") carregarClientes()
if(t=="rota") carregarRota()
if(t=="dashboard") carregarDashboard()

}

function voltarMenu(){

document.getElementById("clientes").style.display="none"
document.getElementById("rota").style.display="none"
document.getElementById("mapa").style.display="none"
document.getElementById("dashboard").style.display="none"

document.getElementById("menu").style.display="block"

}

async function carregarClientes(){

let r=await fetch(API+"?action=clientes")

clientes=await r.json()

mostrarClientes(clientes)

}

function mostrarClientes(lista){

const div=document.getElementById("listaClientes")

div.innerHTML=""

lista.forEach(c=>{

div.innerHTML+=`

<div class="card">

<b>${c.codigo}</b><br>
${c.cliente}<br>
${c.endereco}

<br>

<button onclick="addRota('${c.codigo}')">Adicionar rota</button>

<button onclick="abrirRota('${c.endereco}')">Abrir rota</button>

</div>

`

})

}

async function addRota(codigo){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_salvar&codigo="+codigo+"&vendedor="+vendedor)

let d=await r.json()

if(d.status=="existe"){

alert("Cliente já está na rota")

}else{

alert("Adicionado à rota")

}

}

async function carregarRota(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_listar&vendedor="+vendedor)

let rota=await r.json()

const div=document.getElementById("listaRota")

div.innerHTML=""

rota.forEach(c=>{

let classe=c.visitado?"card visitado":"card"

div.innerHTML+=`

<div class="${classe}">

<b>${c.codigo}</b><br>
${c.cliente}<br>
${c.endereco}

<br>

<button onclick="abrirRota('${c.endereco}')">Iniciar rota</button>

<button onclick="visita('${c.codigo}')">Visitado</button>

</div>

`

})

}

async function visita(codigo){

let vendedor=localStorage.getItem("vendedor")

await fetch(API+"?action=visita&codigo="+codigo+"&vendedor="+vendedor)

carregarRota()

}

function abrirRota(endereco){

window.open(
"https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(endereco)
)

}

async function carregarDashboard(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=dashboard&vendedor="+vendedor)

let d=await r.json()

new Chart(document.getElementById("grafico"),{

type:"doughnut",

data:{

labels:["Visitados","Restantes"],

datasets:[{

data:[d.visitas_hoje,d.total_rota-d.visitas_hoje],

backgroundColor:["green","red"]

}]

}

})

}

</script>

</body>

</html>
