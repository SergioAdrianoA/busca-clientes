<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema de Rotas</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.visitado{
background:#d4edda;
}

input,select{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
cursor:pointer;
margin:3px;
}

.menu button{
width:100%;
padding:15px;
font-size:16px;
}

#map{
height:420px;
border-radius:10px;
}

</style>

</head>

<body>

<header>
Sistema de Rotas
</header>


<!-- LOGIN -->

<div id="login" class="container">

<h2>Login</h2>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>


<!-- MENU -->

<div id="menu" class="container" style="display:none">

<h2>Menu</h2>

<div class="menu">

<button onclick="abrirTela('clientes')">📋 Clientes</button>
<button onclick="abrirTela('rota')">📅 Rota do Dia</button>
<button onclick="abrirTela('mapa')">🗺 Mapa</button>
<button onclick="abrirTela('dashboard')">📊 Dashboard</button>
<button onclick="logout()">🚪 Sair</button>

</div>

</div>


<!-- CLIENTES -->

<div id="clientes" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Clientes</h2>

<input id="busca" placeholder="Buscar cliente">

<select id="filtroCidade"></select>
<select id="filtroBairro"></select>
<select id="filtroBase"></select>

<button onclick="buscarClientes()">🔎 Buscar</button>

<div id="listaClientes"></div>

</div>


<!-- ROTA -->

<div id="rota" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Rota do Dia</h2>

<div id="listaRota"></div>

</div>


<!-- MAPA -->

<div id="mapa" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Mapa</h2>

<button onclick="mostrarRotaMapa()">🗺 Mostrar rota do dia</button>
<button onclick="gerarRotaGoogle()">🧭 Gerar rota</button>
<button onclick="clientesProximos()">📍 Clientes próximos</button>

<br><br>

<div id="map"></div>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Dashboard</h2>

<div id="dadosDashboard"></div>

</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API="https://script.google.com/macros/s/AKfycbyi69WjNXYRyIU281YMsZuhtj03Gg-r-W6rOFMwO1rcnuZNRIm8vXNGy053nx32mwgM/exec";

let mapa;
let marcadores=[];



function abrirTela(nome){

document.getElementById("menu").style.display="none"

document.getElementById("clientes").style.display="none"
document.getElementById("rota").style.display="none"
document.getElementById("mapa").style.display="none"
document.getElementById("dashboard").style.display="none"

document.getElementById(nome).style.display="block"

if(nome=="rota") carregarRota()
if(nome=="dashboard") carregarDashboard()

if(nome=="mapa"){
setTimeout(()=>{ mapa.invalidateSize() },300)
}

}



function voltarMenu(){

document.getElementById("clientes").style.display="none"
document.getElementById("rota").style.display="none"
document.getElementById("mapa").style.display="none"
document.getElementById("dashboard").style.display="none"

document.getElementById("menu").style.display="block"

}



async function login(){

let usuario=document.getElementById("usuario").value
let senha=document.getElementById("senha").value

let r=await fetch(API+"?action=login&usuario="+usuario+"&senha="+senha)

let d=await r.json()

if(d.status=="ok"){

localStorage.setItem("vendedor",usuario)

document.getElementById("login").style.display="none"
document.getElementById("menu").style.display="block"

}else{

alert("Login inválido")

}

}



function logout(){

localStorage.removeItem("vendedor")
location.reload()

}



function iniciarMapa(){

mapa=L.map("map").setView([-2.638,-54.937],12)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(mapa)

}



async function mostrarRotaMapa(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_listar&vendedor="+vendedor)

let rota=await r.json()

marcadores.forEach(m=>mapa.removeLayer(m))
marcadores=[]

rota.forEach(c=>{

if(!c.lat) return

let cor=c.visitado?"green":"red"

let marker=L.circleMarker([c.lat,c.lng],{
radius:8,
color:cor
})
.addTo(mapa)
.bindPopup("<b>"+c.cliente+"</b><br>"+c.endereco)

marcadores.push(marker)

})

if(marcadores.length){

let grupo=new L.featureGroup(marcadores)

mapa.fitBounds(grupo.getBounds())

}

}



async function gerarRotaGoogle(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_listar&vendedor="+vendedor)

let rota=await r.json()

if(rota.length==0){
alert("Nenhum cliente na rota")
return
}

let destino=rota[rota.length-1].endereco

let waypoints=rota.slice(0,-1)
.map(c=>c.endereco)
.join("|")

let url="https://www.google.com/maps/dir/?api=1"
+"&destination="+encodeURIComponent(destino)
+"&waypoints="+encodeURIComponent(waypoints)

window.open(url)

}



async function clientesProximos(){

navigator.geolocation.getCurrentPosition(async pos=>{

let lat=pos.coords.latitude
let lng=pos.coords.longitude

let r=await fetch(API+"?action=buscar&q=")

let lista=await r.json()

marcadores.forEach(m=>mapa.removeLayer(m))
marcadores=[]

lista.forEach(c=>{

if(!c.lat) return

let dist=calcularDistancia(lat,lng,c.lat,c.lng)

if(dist<=2){

let marker=L.marker([c.lat,c.lng])
.addTo(mapa)
.bindPopup(c.cliente+" - "+dist.toFixed(2)+" km")

marcadores.push(marker)

}

})

})

}



function calcularDistancia(lat1,lon1,lat2,lon2){

let R=6371

let dLat=(lat2-lat1)*Math.PI/180
let dLon=(lon2-lon1)*Math.PI/180

let a=Math.sin(dLat/2)*Math.sin(dLat/2)
+
Math.cos(lat1*Math.PI/180)
*Math.cos(lat2*Math.PI/180)
*Math.sin(dLon/2)*Math.sin(dLon/2)

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c

}



iniciarMapa()

</script>

</body>
</html>
