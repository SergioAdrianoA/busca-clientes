<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema de Rotas</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.visitado{
background:#d4edda;
}

input,select{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
cursor:pointer;
margin:4px;
}

.menu button{
width:100%;
padding:15px;
font-size:16px;
}

#map{
height:420px;
border-radius:10px;
}

</style>

</head>

<body>

<header>
Sistema de Rotas
</header>

<!-- LOGIN -->

<div id="login" class="container">

<h2>Login</h2>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- MENU -->

<div id="menu" class="container" style="display:none">

<h2>Menu</h2>

<div class="menu">

<button onclick="abrirTela('clientes')">📋 Clientes</button>
<button onclick="abrirTela('rota')">📅 Rota do Dia</button>
<button onclick="abrirTela('mapa')">🗺 Mapa</button>
<button onclick="abrirTela('dashboard')">📊 Dashboard</button>
<button onclick="logout()">🚪 Sair</button>

</div>

</div>

<!-- CLIENTES -->

<div id="clientes" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Clientes</h2>

<input id="busca" placeholder="Buscar cliente">

<select id="filtroCidade"></select>
<select id="filtroBairro"></select>
<select id="filtroBase"></select>

<button onclick="buscarClientes()">🔎 Buscar</button>

<div id="listaClientes"></div>

</div>

<!-- ROTA -->

<div id="rota" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Rota do Dia</h2>

<button onclick="iniciarRota()">🚀 Iniciar Rota</button>

<div id="listaRota"></div>

</div>

<!-- MAPA -->

<div id="mapa" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Mapa da Rota</h2>

<button onclick="mostrarRotaMapa()">Mostrar rota no mapa</button>
<button onclick="gerarRotaGoogle()">Abrir rota no Google Maps</button>

<br><br>

<div id="map"></div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Dashboard</h2>

<canvas id="grafico"></canvas>

</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API="https://script.google.com/macros/s/AKfycbyi69WjNXYRyIU281YMsZuhtj03Gg-r-W6rOFMwO1rcnuZNRIm8vXNGy053nx32mwgM/exec"

let mapa
let marcadores=[]

function abrirTela(nome){

document.getElementById("menu").style.display="none"

document.getElementById("clientes").style.display="none"
document.getElementById("rota").style.display="none"
document.getElementById("mapa").style.display="none"
document.getElementById("dashboard").style.display="none"

document.getElementById(nome).style.display="block"

if(nome=="clientes"){
carregarFiltros()
}

if(nome=="rota"){
carregarRota()
}

if(nome=="dashboard"){
carregarDashboard()
}

if(nome=="mapa"){
setTimeout(()=>{mapa.invalidateSize()},300)
}

}

function voltarMenu(){

document.getElementById("clientes").style.display="none"
document.getElementById("rota").style.display="none"
document.getElementById("mapa").style.display="none"
document.getElementById("dashboard").style.display="none"

document.getElementById("menu").style.display="block"

}

async function login(){

let usuario=document.getElementById("usuario").value
let senha=document.getElementById("senha").value

let r=await fetch(API+"?action=login&usuario="+usuario+"&senha="+senha)

let d=await r.json()

if(d.status=="ok"){

localStorage.setItem("vendedor",usuario)

document.getElementById("login").style.display="none"
document.getElementById("menu").style.display="block"

}else{

alert("Login inválido")

}

}

function logout(){

localStorage.removeItem("vendedor")
location.reload()

}

async function carregarFiltros(){

let r=await fetch(API+"?action=filtros")

let dados=await r.json()

let cidade=document.getElementById("filtroCidade")
let bairro=document.getElementById("filtroBairro")
let base=document.getElementById("filtroBase")

cidade.innerHTML="<option value=''>Cidade</option>"
bairro.innerHTML="<option value=''>Bairro</option>"
base.innerHTML="<option value=''>Base</option>"

dados.cidades.forEach(c=>{
cidade.innerHTML+=`<option value="${c}">${c}</option>`
})

dados.bairros.forEach(b=>{
bairro.innerHTML+=`<option value="${b}">${b}</option>`
})

dados.bases.forEach(b=>{
base.innerHTML+=`<option value="${b}">${b}</option>`
})

}

async function buscarClientes(){

let termo=document.getElementById("busca").value
let cidade=document.getElementById("filtroCidade").value
let bairro=document.getElementById("filtroBairro").value
let base=document.getElementById("filtroBase").value

let url=API+"?action=buscar&q="+termo+
"&cidade="+cidade+
"&bairro="+bairro+
"&base="+base

let r=await fetch(url)

let clientes=await r.json()

let div=document.getElementById("listaClientes")

div.innerHTML=""

clientes.forEach(c=>{

div.innerHTML+=`

<div class="card">

<b>${c.codigo}</b><br>
${c.cliente}<br>
${c.endereco}<br>
Cidade: ${c.cidade}<br>
Bairro: ${c.bairro}<br>
Base: ${c.base}

<br><br>

<button onclick="addRota('${c.codigo}')">Adicionar à rota</button>

<button onclick="abrirRota('${c.endereco}')">Abrir rota</button>

</div>

`

})

}

async function addRota(codigo){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_salvar&codigo="+codigo+"&vendedor="+vendedor)

let d=await r.json()

if(d.status=="existe"){
alert("Cliente já está na rota")
}else{
alert("Cliente adicionado")
}

}

async function carregarRota(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_listar&vendedor="+vendedor)

let rota=await r.json()

const div=document.getElementById("listaRota")

div.innerHTML=""

rota.forEach(c=>{

let classe=c.visitado?"card visitado":"card"

div.innerHTML+=`

<div class="${classe}">

<b>${c.codigo}</b><br>
${c.cliente}<br>
${c.endereco}

<br><br>

<button onclick="visita('${c.codigo}')">Registrar visita</button>

<button onclick="removerRota('${c.codigo}')">Remover cliente</button>

<button onclick="abrirRota('${c.endereco}')">Abrir rota</button>

</div>

`

})

}

async function removerRota(codigo){

let vendedor=localStorage.getItem("vendedor")

await fetch(API+"?action=rota_remover&codigo="+codigo+"&vendedor="+vendedor)

carregarRota()

}

async function visita(codigo){

let vendedor=localStorage.getItem("vendedor")

await fetch(API+"?action=visita&codigo="+codigo+"&vendedor="+vendedor)

alert("Visita registrada")

carregarRota()

}

function abrirRota(endereco){

window.open(
"https://www.google.com/maps/dir/?api=1&destination="+
encodeURIComponent(endereco)
)

}

function iniciarMapa(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lng=pos.coords.longitude

mapa=L.map("map").setView([lat,lng],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(mapa)

L.marker([lat,lng]).addTo(mapa).bindPopup("Você está aqui")

})

}

async function mostrarRotaMapa(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_listar&vendedor="+vendedor)

let rota=await r.json()

marcadores.forEach(m=>mapa.removeLayer(m))

marcadores=[]

let pontos=[]

rota.forEach(c=>{

if(!c.lat) return

let cor=c.visitado?"green":"red"

let m=L.circleMarker([c.lat,c.lng],{
radius:8,
color:cor
})
.addTo(mapa)
.bindPopup(c.cliente)

marcadores.push(m)

pontos.push([c.lat,c.lng])

})

if(pontos.length>1){

L.polyline(pontos,{
color:"blue"
}).addTo(mapa)

}

}

function gerarRotaGoogle(){

window.open("https://www.google.com/maps")

}

function iniciarRota(){

abrirTela("mapa")

mostrarRotaMapa()

}

async function carregarDashboard(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=dashboard&vendedor="+vendedor)

let d=await r.json()

let pendentes=d.total_rota-d.visitas_hoje

let total=d.total_rota||1

let percVisitados=Math.round((d.visitas_hoje/total)*100)

let percPendentes=100-percVisitados

new Chart(document.getElementById("grafico"),{

type:"doughnut",

data:{
labels:[
"Visitados "+percVisitados+"%",
"Pendentes "+percPendentes+"%"
],
datasets:[{
data:[d.visitas_hoje,pendentes],
backgroundColor:["green","orange"]
}]
}

})

}

let vendedorSalvo=localStorage.getItem("vendedor")

if(vendedorSalvo){

document.getElementById("login").style.display="none"
document.getElementById("menu").style.display="block"

}

iniciarMapa()

</script>

</body>
</html>
