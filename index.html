<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema de Rotas</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.visitado{
background:#d4edda;
}

input,select{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
cursor:pointer;
margin:3px;
}

.menu button{
width:100%;
padding:15px;
font-size:16px;
}

#map{
height:400px;
border-radius:10px;
}

</style>

</head>

<body>

<header>
Sistema de Rotas
</header>


<!-- LOGIN -->

<div id="login" class="container">

<h2>Login</h2>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>


<!-- MENU -->

<div id="menu" class="container" style="display:none">

<h2>Menu</h2>

<div class="menu">

<button onclick="abrirTela('clientes')">📋 Clientes</button>
<button onclick="abrirTela('rota')">📅 Rota do Dia</button>
<button onclick="abrirTela('mapa')">🗺 Mapa dos Clientes</button>
<button onclick="abrirTela('dashboard')">📊 Dashboard</button>
<button onclick="logout()">🚪 Sair</button>

</div>

</div>


<!-- CLIENTES -->

<div id="clientes" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Clientes</h2>

<input id="busca" placeholder="Buscar cliente">

<select id="filtroCidade">
<option value="">Cidade</option>
</select>

<select id="filtroBairro">
<option value="">Bairro</option>
</select>

<select id="filtroBase">
<option value="">Base</option>
</select>

<button onclick="buscarClientes()">
🔎 Buscar
</button>
  
<div id="listaClientes"></div>

</div>


<!-- ROTA -->

<div id="rota" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Rota do Dia</h2>

<div id="listaRota"></div>

</div>


<!-- MAPA -->

<div id="mapa" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Mapa</h2>

<div id="map"></div>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="container" style="display:none">

<button onclick="voltarMenu()">← Menu</button>

<h2>Dashboard</h2>

<div id="dadosDashboard"></div>

</div>



<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API="https://script.google.com/macros/s/AKfycbyi69WjNXYRyIU281YMsZuhtj03Gg-r-W6rOFMwO1rcnuZNRIm8vXNGy053nx32mwgM/exec";

let mapa;
let marcadores=[];
let tempoBusca;



function abrirTela(nome){

document.getElementById("menu").style.display="none"
document.getElementById("clientes").style.display="none"
document.getElementById("rota").style.display="none"
document.getElementById("mapa").style.display="none"
document.getElementById("dashboard").style.display="none"

document.getElementById(nome).style.display="block"

if(nome=="clientes") carregarClientes()
if(nome=="rota") carregarRota()
if(nome=="dashboard") carregarDashboard()

}



function voltarMenu(){

document.getElementById("clientes").style.display="none"
document.getElementById("rota").style.display="none"
document.getElementById("mapa").style.display="none"
document.getElementById("dashboard").style.display="none"

document.getElementById("menu").style.display="block"

}



async function login(){

let usuario=document.getElementById("usuario").value
let senha=document.getElementById("senha").value

let r=await fetch(API+"?action=login&usuario="+usuario+"&senha="+senha)

let d=await r.json()

if(d.status=="ok"){

localStorage.setItem("vendedor",usuario)

document.getElementById("login").style.display="none"
document.getElementById("menu").style.display="block"

}else{

alert("Login inválido")

}

}



function logout(){

localStorage.removeItem("vendedor")
location.reload()

}



function carregarClientes(){

document.getElementById("listaClientes").innerHTML =
"<div class='card'>Digite algo para buscar clientes</div>"

}



async function buscarClientes(){

let termo=document.getElementById("busca").value

let cidade=document.getElementById("filtroCidade").value
let bairro=document.getElementById("filtroBairro").value
let base=document.getElementById("filtroBase").value

let url = API +
"?action=buscar&q="+encodeURIComponent(termo)+
"&cidade="+cidade+
"&bairro="+bairro+
"&base="+base

let r = await fetch(url)

let lista = await r.json()

mostrarClientes(lista)

}



function mostrarClientes(lista){

const div=document.getElementById("listaClientes")

div.innerHTML=""

lista.forEach(c=>{

div.innerHTML+=`

<div class="card">

<b>${c.codigo}</b><br>
${c.cliente}<br>
${c.endereco}

<br><br>

<button onclick="addRota('${c.codigo}')">
Adicionar à rota
</button>

<button onclick="abrirRota('${c.endereco}')">
Abrir rota
</button>

</div>

`

})

}



document.getElementById("busca").addEventListener("input",function(){

clearTimeout(tempoBusca)

tempoBusca=setTimeout(buscarClientes,400)

})

document.getElementById("filtroCidade").addEventListener("change",buscarClientes)
document.getElementById("filtroBairro").addEventListener("change",buscarClientes)
document.getElementById("filtroBase").addEventListener("change",buscarClientes)



async function addRota(codigo){

let vendedor=localStorage.getItem("vendedor")

let r = await fetch(
API+"?action=rota_salvar&codigo="+codigo+"&vendedor="+vendedor
)

let d = await r.json()

if(d.status=="existe"){

alert("Cliente já está na rota de hoje")

}else{

alert("Adicionado à rota")

}

}



async function carregarRota(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_listar&vendedor="+vendedor)

let rota=await r.json()

const div=document.getElementById("listaRota")

div.innerHTML=""

rota.forEach(c=>{

let classe = c.visitado ? "card visitado" : "card"

div.innerHTML+=`

<div class="${classe}">

<b>${c.codigo}</b><br>
${c.cliente}<br>
${c.endereco}

<br><br>

<button onclick="abrirRota('${c.endereco}')">
Iniciar rota
</button>

<button onclick="visita('${c.codigo}')">
Registrar visita
</button>

</div>

`

})

}



async function visita(codigo){

let vendedor=localStorage.getItem("vendedor")

await fetch(API+"?action=visita&codigo="+codigo+"&vendedor="+vendedor)

carregarRota()

}



function abrirRota(endereco){

window.open(
"https://www.google.com/maps/dir/?api=1&destination="+
encodeURIComponent(endereco)
)

}



function iniciarMapa(){

mapa=L.map("map").setView([-2.638,-54.937],12)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(mapa)

}



async function carregarDashboard(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=dashboard&vendedor="+vendedor)

let d=await r.json()

let visitas=d.visitas_hoje
let faltam=d.total_rota-visitas

document.getElementById("dadosDashboard").innerHTML =
'<canvas id="grafico"></canvas>'

new Chart(document.getElementById("grafico"),{

type:"doughnut",

data:{
labels:["Visitados","Restantes"],
datasets:[{
data:[visitas,faltam],
backgroundColor:["#4caf50","#f44336"]
}]
}

})

}



let vendedorSalvo=localStorage.getItem("vendedor")

if(vendedorSalvo){

document.getElementById("login").style.display="none"
document.getElementById("menu").style.display="block"

}



iniciarMapa()

</script>



<script>

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
