<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f4f6f8}

header{background:#1976d2;color:white;padding:15px;text-align:center}

.container{padding:15px}

.card{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.15)
}

#map{height:420px}

button{
padding:10px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
margin:3px
}

</style>

</head>

<body>

<header>Sistema de Rotas</header>

<div class="container">

<button onclick="mostrarRotaMapa()">Mostrar rota</button>
<button onclick="clientesProximos()">Clientes próximos</button>
<button onclick="gerarRotaGoogle()">Gerar rota Google</button>

<div id="map"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyi69WjNXYRyIU281YMsZuhtj03Gg-r-W6rOFMwO1rcnuZNRIm8vXNGy053nx32mwgM/exec"

let mapa=L.map('map').setView([-2.6,-54.9],12)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(mapa)

let marcadores=[]

async function mostrarRotaMapa(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_listar&vendedor="+vendedor)

let rota=await r.json()

marcadores.forEach(m=>mapa.removeLayer(m))
marcadores=[]

rota.forEach(c=>{

if(!c.lat) return

let cor=c.visitado?"green":"red"

let m=L.circleMarker([c.lat,c.lng],{
radius:8,
color:cor
})
.addTo(mapa)
.bindPopup(c.cliente)

marcadores.push(m)

})

if(marcadores.length){

let grupo=new L.featureGroup(marcadores)

mapa.fitBounds(grupo.getBounds())

}

}



async function gerarRotaGoogle(){

let vendedor=localStorage.getItem("vendedor")

let r=await fetch(API+"?action=rota_listar&vendedor="+vendedor)

let rota=await r.json()

let destino=rota[rota.length-1].endereco

let waypoints=rota.slice(0,-1)
.map(c=>c.endereco)
.join("|")

let url="https://www.google.com/maps/dir/?api=1"
+"&destination="+encodeURIComponent(destino)
+"&waypoints="+encodeURIComponent(waypoints)

window.open(url)

}



async function clientesProximos(){

navigator.geolocation.getCurrentPosition(async pos=>{

let lat=pos.coords.latitude
let lng=pos.coords.longitude

let r=await fetch(API+"?action=buscar&q=")

let lista=await r.json()

marcadores.forEach(m=>mapa.removeLayer(m))
marcadores=[]

lista.forEach(c=>{

if(!c.lat) return

let dist=calcularDistancia(lat,lng,c.lat,c.lng)

if(dist<=2){

let m=L.marker([c.lat,c.lng])
.addTo(mapa)
.bindPopup(c.cliente+" - "+dist.toFixed(2)+" km")

marcadores.push(m)

}

})

})

}



function calcularDistancia(lat1,lon1,lat2,lon2){

let R=6371

let dLat=(lat2-lat1)*Math.PI/180
let dLon=(lon2-lon1)*Math.PI/180

let a=Math.sin(dLat/2)*Math.sin(dLat/2)
+
Math.cos(lat1*Math.PI/180)
*Math.cos(lat2*Math.PI/180)
*Math.sin(dLon/2)*Math.sin(dLon/2)

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c

}

</script>

</body>

</html>
